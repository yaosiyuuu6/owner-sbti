interface:
  display_name: "Owner SBTI"
  short_description: "先让用户选择SBTI，再基于同一用户在当前运行环境中所有可访问线程的交互数据自动评估主人并生成SBTI审判结果"
  default_prompt: "Use $owner-sbti to ask for my original SBTI type first, then automatically inspect all accessible same-user threads in the current runtime, not just the current context, and generate an SBTI-style judgment result page."

policy:
  allow_implicit_invocation: true
